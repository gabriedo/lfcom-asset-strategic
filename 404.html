<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LFCOM</title>
  <script>
    // SPA redirect: preserva o path e redireciona para index.html
    // O sessionStorage guarda o path para o React Router resolver
    var pathSegmentsToKeep = 0;
    var l = window.location;
    var path = l.pathname.slice(1);
    var query = l.search;
    var hash = l.hash;
    
    // Salva o path original no sessionStorage
    sessionStorage.setItem('spa-redirect', path + query + hash);
    
    // Redireciona para a raiz
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + (query ? '?' + query : ''));
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
